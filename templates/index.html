<!DOCTYPE html>
<html>
<head>
    <title>Medical Logistics | Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #121212; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; height: 100vh; overflow: hidden;}

        #sidebar { width: 350px; background: #1e1e1e; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; border-right: 1px solid #333; z-index: 100;}
        #map { flex: 1; height: 100%; position: relative;}
        #console-panel { width: 400px; background: #1a1a1a; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; border-left: 1px solid #333; z-index: 100;}

        h2 { color: #ff4d4d; margin-top: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px;}
        .queue-item { background: #2a2a2a; padding: 10px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;}
        .queue-item select { background: #444; color: white; border: none; padding: 5px; border-radius: 4px; }
        .bulk-actions { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #444; display: flex; gap: 10px;}
        .bulk-actions select { flex: 1; background: #444; color: white; border: none; padding: 8px; border-radius: 4px; }

        button { background: #ff4d4d; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%;}
        button:hover { background: #ff3333; }
        .apply-btn { width: auto; background: #4CAF50; }

        /* Flowing line animation */
        .flow-line { animation: flow 1s linear infinite; }
        @keyframes flow { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }

        #log-container { flex: 1; overflow-y: auto; background: #111; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; color: #00ffcc; line-height: 1.5; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #222; padding-bottom: 4px; }

        /* Slider Styling */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #00ffcc; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #444; border-radius: 2px; }

        /* --- NEW HOSPITAL DETAILS WIDGET --- */
        #info-panel {
            position: fixed;
            right: 420px; /* Placed exactly to the left of the console panel */
            bottom: -600px; /* Hidden off-screen initially */
            width: 320px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #555;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.7);
            transition: bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 1000;
            box-sizing: border-box;
        }
        #info-panel.show {
            bottom: 0;
        }
        .info-header { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px; }
        .info-header h3 { margin: 0; color: #ff4d4d; font-size: 16px; width: 85%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .close-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 24px; padding: 0; line-height: 16px; width: auto; }
        .close-btn:hover { color: white; background: none;}

        .info-stats { font-size: 13px; color: #ccc; margin-bottom: 15px; line-height: 1.6;}
        .info-stats span { color: white; font-weight: bold; }

        .blood-grid-full { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px;}
        .bg-card { background: #222; padding: 8px 12px; border-radius: 4px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333;}
        .bg-card span { color: #ff4d4d; font-weight: bold; font-size: 15px;}
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Crisis Command</h2>
        <div class="bulk-actions">
            <select id="bulkCrisisType">
                <option value="0">Minor (1u/s)</option>
                <option value="1">Small (2u/s)</option>
                <option value="2">Medium (3u/s)</option>
                <option value="3">Large (4u/s)</option>
            </select>
            <button class="apply-btn" onclick="applyBulkCrisis()">Apply All</button>
        </div>
        <div id="queueContainer" style="flex: 1; overflow-y: auto;"></div>
        <button onclick="executeCrisis()" style="margin-top: 15px; padding: 15px; font-size: 16px;">EXECUTE CRISIS</button>
        <button onclick="clearQueue()" style="margin-top: 10px; background: #555;">Clear Queue</button>

        <div style="margin-top: 25px; padding-top: 15px; border-top: 1px solid #444;">
            <h3 style="color: #00ffcc; margin-top: 0; font-size: 14px; display: flex; justify-content: space-between;">
                <span>Time Multiplier</span>
                <span id="speedValue">1x</span>
            </h3>
            <input type="range" id="timeSlider" min="1" max="25" step="1" value="1">
            <div style="font-size: 10px; color: #888; margin-top: 5px; text-align: center;">1x (Realtime) ↔ 25x (Max Speed)</div>
        </div>
    </div>

    <div id="map">
        <div id="info-panel">
            <div class="info-header">
                <h3 id="panel-name">Hospital Name</h3>
                <button class="close-btn" onclick="closeInfoPanel()">&times;</button>
            </div>

            <div class="info-stats">
                <div>Class: <span id="panel-size"></span> | Total Reserves: <span id="panel-total"></span>u</div>
                <div>Temp: <span id="panel-temp"></span>°C | Weather: <span id="panel-weather"></span></div>
            </div>

            <h4 style="margin: 0 0 10px 0; color: #00ffcc; font-size: 14px; text-transform: uppercase;">Blood Inventory</h4>
            <div class="blood-grid-full">
                <div class="bg-card">O+ <span id="panel-opos"></span></div>
                <div class="bg-card">O- <span id="panel-oneg"></span></div>
                <div class="bg-card">A+ <span id="panel-apos"></span></div>
                <div class="bg-card">A- <span id="panel-aneg"></span></div>
                <div class="bg-card">B+ <span id="panel-bpos"></span></div>
                <div class="bg-card">B- <span id="panel-bneg"></span></div>
                <div class="bg-card">AB+ <span id="panel-abpos"></span></div>
                <div class="bg-card">AB- <span id="panel-abneg"></span></div>
            </div>

            <button onclick="addPanelToQueue()" style="background: #ff4d4d;">+ Add to Crisis Queue</button>
            <div style="font-size: 10px; color: #777; text-align: center; margin-top: 8px;">(Pro Tip: Ctrl+Click map dots to quick-add)</div>
        </div>
    </div>

    <div id="console-panel">
        <h2 style="color: #00ffcc;">Network Traffic</h2>
        <div id="log-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([12.9716, 77.5946], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let markers = {};
        let activePolylines = [];
        let crisisQueue = [];
        let hospitalDataMap = {}; // Stores live data for the panel
        let selectedHospitalId = null; // Tracks which hospital widget is open

        // Timescale Slider Logic
        const timeSlider = document.getElementById('timeSlider');
        const speedValue = document.getElementById('speedValue');
        timeSlider.addEventListener('input', function() { speedValue.innerText = this.value + 'x'; });
        timeSlider.addEventListener('change', function() {
            fetch('/api/timescale', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ timescale: parseFloat(this.value) })
            });
        });

        function extractCoords(locationStr) {
            const regex = /[-+]?\d*\.\d+/g;
            const matches = locationStr.match(regex);
            if (matches && matches.length >= 2) return [parseFloat(matches[0]), parseFloat(matches[1])];
            return null;
        }

        // --- Widget Panel Functions ---
        function updateInfoPanel(hosp) {
            document.getElementById('panel-name').innerText = hosp.name;
            document.getElementById('panel-size').innerText = hosp.Size || 'Unknown';
            document.getElementById('panel-total').innerText = hosp.Total_Units;
            document.getElementById('panel-temp').innerText = hosp.Temperature !== null ? hosp.Temperature : '--';
            document.getElementById('panel-weather').innerText = hosp.Weather || '--';

            document.getElementById('panel-opos').innerText = hosp.O_pos;
            document.getElementById('panel-oneg').innerText = hosp.O_neg;
            document.getElementById('panel-apos').innerText = hosp.A_pos;
            document.getElementById('panel-aneg').innerText = hosp.A_neg;
            document.getElementById('panel-bpos').innerText = hosp.B_pos;
            document.getElementById('panel-bneg').innerText = hosp.B_neg;
            document.getElementById('panel-abpos').innerText = hosp.AB_pos;
            document.getElementById('panel-abneg').innerText = hosp.AB_neg;
        }

        function closeInfoPanel() {
            document.getElementById('info-panel').classList.remove('show');
            selectedHospitalId = null;
        }

        function addPanelToQueue() {
            if (selectedHospitalId && hospitalDataMap[selectedHospitalId]) {
                toggleQueue(selectedHospitalId, hospitalDataMap[selectedHospitalId].name);
            }
        }

        // --- Queue Logic ---
        function toggleQueue(id, name) {
            const index = crisisQueue.findIndex(h => h.id === id);
            if (index > -1) crisisQueue.splice(index, 1);
            else crisisQueue.push({ id: id, name: name, type: 0 });
            renderQueue();
        }

        function renderQueue() {
            const container = document.getElementById('queueContainer');
            container.innerHTML = '';
            crisisQueue.forEach((item, index) => {
                container.innerHTML += `
                    <div class="queue-item">
                        <span>${item.name.substring(0, 15)}...</span>
                        <select onchange="updateCrisisType(${index}, this.value)">
                            <option value="0" ${item.type == 0 ? 'selected' : ''}>Minor</option>
                            <option value="1" ${item.type == 1 ? 'selected' : ''}>Small</option>
                            <option value="2" ${item.type == 2 ? 'selected' : ''}>Medium</option>
                            <option value="3" ${item.type == 3 ? 'selected' : ''}>Large</option>
                        </select>
                    </div>
                `;
            });
        }

        function updateCrisisType(index, val) { crisisQueue[index].type = parseInt(val); }
        function applyBulkCrisis() {
            const bulkVal = parseInt(document.getElementById('bulkCrisisType').value);
            crisisQueue.forEach(item => item.type = bulkVal);
            renderQueue();
        }
        function clearQueue() { crisisQueue = []; renderQueue(); }

        function executeCrisis() {
            if (crisisQueue.length === 0) return alert("Queue is empty!");
            fetch('/api/trigger_crisis', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(crisisQueue)
            }).then(() => clearQueue());
        }

        // --- Data Fetching ---
        function fetchData() {
            fetch('/api/hospitals').then(res => res.json()).then(data => {
                data.forEach(hosp => {
                    hospitalDataMap[hosp.id] = hosp; // Store for the panel

                    const coords = extractCoords(hosp.location);
                    if (!coords) return;

                    if (!markers[hosp.id]) {
                        // Create marker WITHOUT a popup
                        const marker = L.circleMarker(coords, { radius: 6, color: "#ff4d4d", fillColor: "#ff4d4d", fillOpacity: 0.8 }).addTo(map);

                        // New Click Event
                        marker.on('click', function(e) {
                            if (e.originalEvent.ctrlKey || e.originalEvent.metaKey) {
                                toggleQueue(hosp.id, hosp.name);
                            } else {
                                selectedHospitalId = hosp.id;
                                updateInfoPanel(hospitalDataMap[hosp.id]); // Load fresh data
                                document.getElementById('info-panel').classList.add('show'); // Slide up
                            }
                        });
                        markers[hosp.id] = marker;
                    }
                });

                // Live-update the panel's numbers if it is currently open
                if (selectedHospitalId && hospitalDataMap[selectedHospitalId]) {
                    updateInfoPanel(hospitalDataMap[selectedHospitalId]);
                }
            });
        }

        function fetchRoutes() {
            fetch('/api/routes').then(res => res.json()).then(data => {
                activePolylines.forEach(p => map.removeLayer(p));
                activePolylines = [];

                Object.values(markers).forEach(m => m.setStyle({color: '#ff4d4d', fillColor: '#ff4d4d'}));

                data.forEach(route => {
                    if (markers[route.receiver_id]) {
                        markers[route.receiver_id].setStyle({color: '#00ff00', fillColor: '#00ff00'});
                    }

                    route.donors.forEach(donor => {
                        if (markers[donor.donor_id]) {
                            markers[donor.donor_id].setStyle({color: '#0088ff', fillColor: '#0088ff'});
                        }

                        const line = L.polyline(donor.route, {
                            color: '#40E0D0',
                            weight: 4,
                            opacity: 0.8,
                            dashArray: '10, 10',
                            className: 'flow-line'
                        }).addTo(map);
                        activePolylines.push(line);
                    });
                });
            });
        }

        function fetchLogs() {
            fetch('/api/logs').then(res => res.json()).then(data => {
                const logContainer = document.getElementById('log-container');
                logContainer.innerHTML = '';
                data.forEach(log => {
                    logContainer.innerHTML += `<div class="log-entry">${log}</div>`;
                });
            });
        }

        // Run data fetches every 500ms
        setInterval(fetchData, 500);
        setInterval(fetchRoutes, 500);
        setInterval(fetchLogs, 500);

        fetchData();
        fetchLogs();
    </script>
</body>
</html>
